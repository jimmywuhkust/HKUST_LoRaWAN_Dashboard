<!-- watch.html - Set & Watch page for the HKUST LoRaWAN Dashboard -->

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>HKUST LoRaWAN – Set & Watch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <aside class="sidebar" role="navigation" aria-label="Main">
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 3a9 9 0 100 18 9 9 0 000-18z" stroke="#9fb6df" stroke-width="1.5"/><path d="M12 3c2.5 2.4 4 5.33 4 9s-1.5 6.6-4 9c-2.5-2.4-4-5.33-4-9s1.5-6.6 4-9z" stroke="#9fb6df" stroke-width="1.5"/><path d="M3 12h18M12 3v18" stroke="#9fb6df" stroke-width="1.2" opacity=".7"/></svg>
      <span>HKUST LoRaWAN</span>
    </div>
    <div class="nav">
      <a href="index.html">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 13h6v7H4zM14 4h6v16h-6zM4 4h6v7H4z" stroke="#a8c6ff" stroke-width="1.5"/></svg>
        <span>Overview</span>
      </a>
      <a href="live.html">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 12c0-2.5 1-4.77 2.64-6.4M21 12c0 2.5-1 4.77-2.64 6.4M7 12c0-1.6.65-3.05 1.7-4.1M17 12c0 1.6-.65 3.05-1.7 4.1M10.5 12a1.5 1.5 0 103 0 1.5 1.5 0 10-3 0z" stroke="#a8c6ff" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span>Live Traffic</span>
      </a>
      <a href="watch.html" aria-current="page">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="7" stroke="#a8c6ff" stroke-width="1.5"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M12 9v6M9 12h6" stroke="#a8c6ff" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span>Set & Watch</span>
      </a>
      <a href="uav.html">
        <svg viewBox="0 0 24 24" fill="none"><path d="M8 12a4 4 0 118 0 4 4 0 11-8 0z" stroke="#a8c6ff" stroke-width="1.5"/><path d="M2 7h6M16 7h6M2 17h6M16 17h6" stroke="#a8c6ff" stroke-width="1.5" stroke-linecap="round"/><path d="M4 7l3 3M20 7l-3 3M4 17l3-3M20 17l-3-3" stroke="#a8c6ff" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span>UAV Monitoring</span>
      </a>
    </div>
    <div class="logo-box"><img src="WANDS_Logo.svg" alt="WANDS Logo" /></div>
  </aside>

  <main class="content" role="region" aria-label="Set and Watch">
    <div class="watch-wrap">
      <!-- Node Watch -->
      <div class="watch-col">
        <h2 class="watch-title">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="5" stroke="#a8c6ff" stroke-width="1.5"/><path d="M2 7h6M16 7h6M2 17h6M16 17h6" stroke="#a8c6ff" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>Node Watch</span>
        </h2>
        <div class="watch-controls">
          <input id="watchDevInput" type="text" placeholder="Enter DevEUI (or pick)" />
          <select id="nodeList"></select>
          <button id="watchDevBtn">Set</button>
          <button id="watchDevPause" aria-pressed="false">Pause</button>
        </div>
        <table class="watch-table" id="tblWatchNode">
          <thead><tr><th>Gateway</th><th>SNR (dB)</th><th>RSSI (dBm)</th><th>Last seen</th></tr></thead>
          <tbody></tbody>
        </table>
        <div class="empty-hint" id="nodeEmpty" style="display:none">No data yet. Pick an active node from the list above.</div>
      </div>

      <!-- Gateway Watch -->
      <div class="watch-col">
        <h2 class="watch-title">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 3v7m0 0l-3 4m3-4l3 4M6 21h12" stroke="#a8c6ff" stroke-width="1.5" stroke-linecap="round"/><path d="M4 9c2.5-2.5 5.5-4 8-4s5.5 1.5 8 4M6 12c1.7-1.7 3.7-2.7 6-2.7s4.3 1 6 2.7" stroke="#a8c6ff" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>Gateway Watch</span>
        </h2>
        <div class="watch-controls">
          <input id="watchGwInput" type="text" placeholder="Enter Gateway ID (or pick)" />
          <select id="gwList"></select>
          <button id="watchGwBtn">Set</button>
          <button id="watchGwPause" aria-pressed="false">Pause</button>
        </div>
        <table class="watch-table" id="tblWatchGw">
          <thead><tr><th>Node (DevEUI)</th><th>SNR (dB)</th><th>RSSI (dBm)</th><th>Last seen</th></tr></thead>
          <tbody></tbody>
        </table>
        <div class="empty-hint" id="gwEmpty" style="display:none">No data yet. Pick an active gateway from the list above.</div>
      </div>
    </div>
  </main>

  <script type="module">
    import './js/watch.js';
  </script>
</body>
</html>
